<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RVK AI Classifier - Prototype</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f6; color: #333; max-width: 800px; margin: 0 auto; padding: 20px; }
        h1 { color: #2c3e50; text-align: center; margin-bottom: 30px; }
        .card { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 20px; border: 1px solid #eaeaea; }
        h3 { margin-top: 0; color: #2c3e50; }
        label { font-weight: bold; display: block; margin-bottom: 8px; }
        input[type="text"], input[type="file"] { width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; font-size: 15px; }
        .btn-group { display: flex; gap: 10px; margin-bottom: 15px; }
        button { background-color: #3498db; color: white; border: none; padding: 12px 20px; border-radius: 6px; cursor: pointer; font-size: 16px; width: 100%; font-weight: bold; transition: background-color 0.2s; }
        button:hover { background-color: #2980b9; }
        button:disabled { background-color: #bdc3c7; cursor: not-allowed; }
        .btn-secondary { background-color: #2c3e50; }
        .btn-secondary:hover { background-color: #1a252f; }
        #resultArea, #searchArea, #statusArea { margin-top: 20px; padding: 15px; border-radius: 6px; display: none; line-height: 1.5; }
        #resultArea, #searchArea { background-color: #f8f9fa; border-left: 4px solid #3498db; }
        #statusArea { display: block; background-color: #fff3cd; color: #856404; border-left: 4px solid #ffeeba; }
        #reader { width: 100%; margin-bottom: 15px; display: none; }
        .book-list { list-style-type: none; padding: 0; margin: 0; }
        .book-list li { padding: 10px 0; border-bottom: 1px solid #eee; }
        .book-list li:last-child { border-bottom: none; }
        .tag { background-color: #e1f0fa; color: #2980b9; padding: 2px 8px; border-radius: 12px; font-size: 0.9em; font-weight: bold; }
        
        /* Styles pour l'étiquette physique */
        #labelSection { display: none; margin-top: 20px; border-top: 2px dashed #ccc; padding-top: 20px; text-align: center; }
        .spine-label { width: 160px; background: white; border: 2px solid #333; padding: 15px; margin: 15px auto; box-shadow: 2px 4px 10px rgba(0,0,0,0.15); text-align: center; font-family: 'Courier New', Courier, monospace; }
        .spine-label .lbl-title { font-size: 0.8em; color: #555; text-transform: uppercase; margin-bottom: 8px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .spine-label .lbl-rvk { font-size: 1.6em; font-weight: bold; margin-bottom: 10px; border-top: 2px solid #333; border-bottom: 2px solid #333; padding: 8px 0; letter-spacing: 1px; }
        .spine-label img { width: 120px; height: 120px; margin: 0 auto; display: block; }
        .spine-label .lbl-footer { font-size: 0.7em; margin-top: 8px; font-weight: bold; }
    </style>
</head>
<body>

    <h1>📚 RVK Smart Classifier</h1>
    
    <div class="card">
        <h3>1. Campus Database</h3>
        <p style="font-size: 0.9em; color: #666; margin-top: -5px;">To ensure university data privacy, the dataset is processed locally in your browser.</p>
        <label for="csvFileInput">Upload the catalog (berlin_books.csv) :</label>
        <input type="file" id="csvFileInput" accept=".csv">
        <div id="statusArea">⚠️ Waiting for CSV file...</div>
    </div>

    <div class="card">
        <h3>2. Classify a New Book</h3>
        <label for="bookInput">Book Title, Author, or ISBN Barcode :</label>
        <input type="text" id="bookInput" placeholder="e.g., Sapiens by Yuval Noah Harari">
        
        <div id="reader"></div>
        
        <div class="btn-group">
            <button class="btn-secondary" onclick="startScanner()">📷 Scan Barcode</button>
            <button id="classifyBtn" onclick="classifyBook()" disabled>✨ Generate RVK</button>
        </div>
        
        <div id="resultArea"></div>

        <div id="labelSection">
            <button class="btn-secondary" onclick="generatePhysicalLabel()" style="width: auto; padding: 8px 20px;">🖨️ Generate Physical Spine Label</button>
            <div id="visualLabelContainer" style="display: none;">
                <div class="spine-label">
                    <div class="lbl-title" id="lblTitle">TITLE</div>
                    <div class="lbl-rvk" id="lblRVK">RVK</div>
                    <img id="lblQR" src="" alt="QR Code">
                    <div class="lbl-footer">CAMPUS BERLIN</div>
                </div>
            </div>
        </div>
    </div>

    <div class="card">
        <h3>3. Explore Catalog</h3>
        <label for="searchInput">Search Query :</label>
        <input type="text" id="searchInput" placeholder="Search for an existing book...">
        <button id="searchBtn" onclick="searchBooks()" disabled>Search</button>
        <div id="searchArea"></div>
    </div>

    <script>
        let libraryData = [];
        let rvkCategories = new Set();
        let html5QrcodeScanner;
        
        // Variables globales pour stocker les données de l'étiquette
        let currentBookName = "";
        let currentAssignedRVK = "";

        // 1. LOCAL CSV FILE HANDLING
        document.getElementById('csvFileInput').addEventListener('change', function(event) {
            const file = event.target.files[0];
            const statusArea = document.getElementById('statusArea');
            
            if (file) {
                statusArea.innerHTML = "⏳ Reading file...";
                Papa.parse(file, {
                    header: true,
                    skipEmptyLines: true,
                    complete: function(results) {
                        libraryData = results.data;
                        libraryData.forEach(row => {
                            if(row.Signatur && row.Signatur.trim() !== "") {
                                rvkCategories.add(row.Signatur.trim());
                            }
                        });
                        statusArea.innerHTML = `✅ <strong>Success!</strong> File loaded securely. <br><strong>${rvkCategories.size}</strong> unique RVK categories found.`;
                        statusArea.style.backgroundColor = "#d4edda";
                        statusArea.style.color = "#155724";
                        statusArea.style.borderLeftColor = "#28a745";
                        
                        document.getElementById('classifyBtn').disabled = false;
                        document.getElementById('searchBtn').disabled = false;
                    }
                });
            }
        });

        // 2. BARCODE SCANNER LOGIC
        function startScanner() {
            document.getElementById('reader').style.display = 'block';
            if(!html5QrcodeScanner) {
                html5QrcodeScanner = new Html5QrcodeScanner("reader", { fps: 10, qrbox: {width: 250, height: 150} }, false);
                html5QrcodeScanner.render((decodedText, decodedResult) => {
                    document.getElementById('bookInput').value = decodedText;
                    document.getElementById('reader').style.display = 'none';
                    html5QrcodeScanner.clear();
                    html5QrcodeScanner = null;
                });
            }
        }

        // 3. AI SIMULATION
        function classifyBook() {
            const bookInfo = document.getElementById('bookInput').value.trim();
            const bookInfoLower = bookInfo.toLowerCase();
            const resultArea = document.getElementById('resultArea');
            const btn = document.getElementById('classifyBtn');
            const labelSection = document.getElementById('labelSection');

            if (!bookInfo) { alert("Please enter a book name or scan a barcode."); return; }

            // Réinitialisation de l'interface
            btn.innerHTML = "Analyzing...";
            btn.disabled = true;
            resultArea.style.display = "block";
            labelSection.style.display = "none";
            document.getElementById('visualLabelContainer').style.display = "none";
            resultArea.innerHTML = "<em>Connecting to AI model and running semantic comparison...</em>";

            setTimeout(() => {
                let responseText = "";
                let assignedRVK = "";

                // Scénarios
                if (bookInfoLower.includes("sapiens") || bookInfoLower.includes("harari")) {
                    assignedRVK = "CC 8200";
                    responseText = `<strong>💡 AI Analysis Result:</strong><br><br> Suggested Category: <span class='tag'>${assignedRVK}</span><br><br><em>Reasoning:</em> This book discusses the history of humankind and societal evolution. In the RVK system, this aligns with the General Sociology and Anthropology section.`;
                } 
                else if (bookInfoLower.includes("steve jobs") || bookInfoLower.includes("isaacson")) {
                    assignedRVK = "QR 500";
                    responseText = `<strong>💡 AI Analysis Result:</strong><br><br> Suggested Category: <span class='tag'>${assignedRVK}</span><br><br><em>Reasoning:</em> This is a biography related to business, technology, and innovation, which fits into the Economics and Management section.`;
                } 
                else {
                    const categoriesArray = Array.from(rvkCategories);
                    assignedRVK = categoriesArray[Math.floor(Math.random() * categoriesArray.length)];
                    responseText = `<strong>💡 AI Analysis Result:</strong><br><br> Suggested Category: <span class='tag'>${assignedRVK}</span><br><br><em>Reasoning:</em> Based on semantic analysis of the input and existing patterns in the Berlin campus database, this category is the best match.`;
                }

                // Sauvegarde pour l'étiquette
                currentBookName = bookInfo;
                currentAssignedRVK = assignedRVK;

                // Affichage des résultats
                resultArea.innerHTML = responseText;
                btn.innerHTML = "✨ Generate RVK";
                btn.disabled = false;
                
                // Fait apparaître le bouton pour générer l'étiquette
                labelSection.style.display = "block";

            }, 1500); 
        }

        // 4. GENERATE PHYSICAL LABEL (L'effet Waouh)
        function generatePhysicalLabel() {
            document.getElementById('lblTitle').innerText = currentBookName;
            document.getElementById('lblRVK').innerText = currentAssignedRVK;
            
            // Génération d'un vrai QR Code basé sur l'URL de l'API (Encode le RVK et le Titre)
            const qrData = encodeURIComponent(`RVK: ${currentAssignedRVK} | Title: ${currentBookName}`);
            document.getElementById('lblQR').src = `https://api.qrserver.com/v1/create-qr-code/?size=120x120&data=${qrData}`;
            
            document.getElementById('visualLabelContainer').style.display = "block";
        }

        // 5. CATALOG SEARCH FUNCTION
        function searchBooks() {
            const query = document.getElementById('searchInput').value.toLowerCase().trim();
            const searchArea = document.getElementById('searchArea');
            if(!query || libraryData.length === 0) return;

            const results = libraryData.filter(book => 
                (book.Titel && book.Titel.toLowerCase().includes(query)) || 
                (book.Verfasser && book.Verfasser.toLowerCase().includes(query))
            ).slice(0, 8); 

            searchArea.style.display = "block";
            
            if(results.length === 0) {
                searchArea.innerHTML = "<em>No books found matching this query.</em>";
                return;
            }

            let html = "<strong>Search Results:</strong><ul class='book-list'>";
            results.forEach(book => {
                const title = book.Titel ? book.Titel : "Unknown Title";
                const author = book.Verfasser ? book.Verfasser : "Unknown Author";
                const sig = book.Signatur ? book.Signatur : "N/A";
                html += `<li>${title} <br><small style="color:#666;">by ${author}</small> <span class='tag' style="float:right;">${sig}</span></li>`;
            });
            html += "</ul>";
            searchArea.innerHTML = html;
        }
    </script>
</body>
</html>
